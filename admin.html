<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VitalCare Technologies | Admin Dashboard</title>

    <link rel="stylesheet" href="style.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Source+Sans+Pro:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
  </head>

  <body onload="checkAdminAccess()">
    <!-- Background animation -->
    <div class="bg-bubbles">
      <div class="bubble bubble-1"></div>
      <div class="bubble bubble-2"></div>
      <div class="bubble bubble-3"></div>
      <div class="bubble bubble-4"></div>
      <div class="bubble bubble-5"></div>
    </div>

    <!-- Header -->
    <header class="header">
      <div class="container">
        <nav class="navbar">
          <div class="logo">
            <i class="fas fa-heartbeat"></i>
            <span class="logo-text"
              >Vital<span class="logo-highlight">Care</span>Tech</span
            >
          </div>

          <ul class="nav-menu">
            <li><a href="profile.html">Profile</a></li>
            <li><a href="admin.html" class="active">Admin</a></li>
            <li><a href="settings.html">Settings</a></li>
            <li><a href="index.html">Logout</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <!-- Admin Section -->
    <section class="auth-section">
      <div class="container">
        <div class="auth-container">
          <div class="auth-header">
            <i class="fas fa-user-shield"></i>
            <h2 class="auth-title">Admin Dashboard</h2>
            <p class="auth-subtitle">
              Welcome Admin. Use the tools below to manage system data.
            </p>
          </div>

          <a href="manage-users.html" class="auth-button">
            <i class="fas fa-users"></i> Manage Users
          </a>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <div class="container">
        <div class="footer-content">
          <div class="footer-logo">
            <i class="fas fa-heartbeat"></i>
            <span class="logo-text"
              >Vital<span class="logo-highlight">Care</span>Tech</span
            >
          </div>

          <p class="footer-text">
            Admin system panel for VitalCare Technologies.
          </p>
        </div>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
